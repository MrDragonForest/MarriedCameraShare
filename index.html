<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭影像 - MarriedCameraShare</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">📷 家庭影像</h1>
        </div>
        <div class="header-right">
            <button id="uploadBtn" class="btn btn-primary upload-btn" style="display: none;">
                <span>➕ 上传照片</span>
            </button>
            <div id="userInfo" class="user-info" style="display: none;">
                <span id="welcomeText"></span>
                <button id="logoutBtn" class="btn btn-secondary">退出</button>
            </div>
            <button id="loginBtn" class="btn btn-primary">登录</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- 筛选栏 -->
        <div class="filter-bar" id="filterBar" style="display: none;">
            <select id="filterUser" class="filter-select">
                <option value="">全部用户</option>
            </select>
            <input type="date" id="filterDate" class="filter-input">
            <input type="text" id="filterTag" class="filter-input" placeholder="标签筛选...">
            <button id="filterBtn" class="btn btn-primary">筛选</button>
            <button id="resetFilterBtn" class="btn btn-secondary">重置</button>
        </div>

        <!-- 图片列表 -->
        <div id="photoList" class="photo-list"></div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </main>

    <!-- 登录/注册弹窗 -->
    <div id="authModal" class="modal">
        <div class="modal-content auth-modal">
            <span class="modal-close" data-close="authModal">&times;</span>
            <div class="auth-header">
                <div class="auth-avatar">👤</div>
                <h2 id="authTitle">登录</h2>
            </div>
            <form id="authForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" required placeholder="请输入密码">
                </div>
                <div class="form-group" id="captchaGroup" style="display: none;">
                    <label>验证码</label>
                    <div class="captcha-wrapper">
                        <input type="text" id="captcha" placeholder="请输入验证码" maxlength="4">
                        <img id="captchaImg" class="captcha-img" alt="验证码">
                    </div>
                </div>
                <div class="form-group">
                    <label>GitHub Token（上传图片必填）</label>
                    <input type="password" id="githubToken" placeholder="填写 token 才能上传图片到仓库">
                    <small style="color: #666; font-size: 12px;">用于将图片保存到 GitHub 仓库</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="authSubmitBtn">登录</button>
            </form>
            <div class="auth-footer">
                <span id="authSwitchText">没有账号？</span>
                <a href="#" id="authSwitch">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 上传弹窗 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content upload-modal">
            <span class="modal-close" data-close="uploadModal">&times;</span>
            <h2>上传新照片</h2>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-placeholder">
                    <span class="upload-icon">📁</span>
                    <p>点击或拖拽上传照片</p>
                    <p class="upload-hint">支持 jpg/png/gif/webp，单文件 ≤10MB</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </div>

            <div id="previewArea" class="preview-area" style="display: none;">
                <p>已选择 <span id="selectedCount">0</span> 张照片</p>
                <div id="previewGrid" class="preview-grid"></div>
            </div>

            <div class="tag-section">
                <label>标签（可选）</label>
                <div class="tag-input-wrapper">
                    <input type="text" id="tagInput" placeholder="输入标签后回车添加">
                    <button type="button" id="addTagBtn" class="btn btn-secondary">添加</button>
                </div>
                <div id="selectedTags" class="selected-tags"></div>
            </div>

            <div class="upload-actions">
                <button type="button" class="btn btn-secondary" data-close="uploadModal">取消</button>
                <button type="button" id="confirmUploadBtn" class="btn btn-primary">确认上传</button>
            </div>
        </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div id="previewModal" class="modal">
        <div class="modal-content preview-image-modal">
            <span class="modal-close" data-close="previewModal">&times;</span>
            <img id="previewImage" src="" alt="预览">
            <div id="previewInfo" class="preview-info"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
